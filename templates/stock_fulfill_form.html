<!DOCTYPE html>
<html>
<head>
  <title>STOCK FULFILL FORM</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: Arial, sans-serif;
    }

    .form-container {
      max-width: 750px;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .form-title {
      text-align: center;
      font-weight: bold;
      margin-bottom: 25px;
      color: #333;
    }

    label {
      font-weight: 600;
      margin-bottom: 5px;
    }

    .form-control, .form-select {
      border-radius: 8px;
      padding: 10px;
    }

    .btn-custom {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      padding: 10px 30px;
      transition: 0.3s;
    }

    .btn-custom:hover {
      opacity: 0.9;
      transform: scale(1.03);
    }

    .btn-reset {
      background: #6c757d;
      color: white;
      border-radius: 8px;
      padding: 10px 20px;
    }

    .btn-back {
      background: #dc3545;
      color: white;
      border-radius: 8px;
      padding: 10px 20px;
    }

    .btn-back:hover, .btn-reset:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<div class="form-container">
  <h3 class="form-title">STOCK FULFILL FORM</h3>

  <form method="POST">

    <!-- ROW 1 -->
    <div class="row mb-3">
      <div class="col">
        <label>UID</label>
        <input type="text" class="form-control" value="{{ row[1] }}" readonly>
      </div>

      <div class="col">
        <label>SUB ID</label>
        <input type="text" class="form-control" value="{{ row[2] }}" readonly>
      </div>
    </div>

    <!-- BRANCH -->
    <div class="mb-3">
      <label>Branch</label>
      <input type="text" class="form-control" value="{{ row[3] }}" readonly>
    </div>

    <!-- ITEM -->
    <div class="mb-3">
      <label>Item</label>
      <select name="item" class="form-select">
        <option value="">Select Item</option>
        {% for i in items %}
        <option value="{{ i }}"
        {% if i|string|trim|lower == row[6]|string|trim|lower %}selected{% endif %}>
          {{ i }}
        </option>
        {% endfor %}
      </select>
    </div>

    <!-- BRAND -->
    <div class="mb-3">
      <label>Brand</label>
      <select name="brand" class="form-select">
        <option value="">Select Brand</option>
        {% for b in brands %}
        <option value="{{ b }}"
        {% if b|string|trim|lower == row[7]|string|trim|lower %}selected{% endif %}>
          {{ b }}
        </option>
        {% endfor %}
      </select>
    </div>

    <!-- DESIGN -->
    <div class="mb-3">
      <label>Design</label>
      <select name="design" class="form-select">
        <option value="">Select Design</option>
        {% for d in designs %}
        <option value="{{ d }}"
        {% if d|string|trim|lower == row[8]|string|trim|lower %}selected{% endif %}>
          {{ d }}
        </option>
        {% endfor %}
      </select>
    </div>

    <!-- TYPE -->
    <div class="mb-3">
      <label>Type</label>
      <select name="type" class="form-select">
        <option value="">Select Type</option>
        {% for t in types %}
        <option value="{{ t }}"
        {% if t|string|trim|lower == row[9]|string|trim|lower %}selected{% endif %}>
          {{ t }}
        </option>
        {% endfor %}
      </select>
    </div>

    <!-- CATEGORY -->
    <div class="mb-3">
      <label>Category</label>
      <select name="category" class="form-select">
        <option value="">Select Category</option>
        {% for c in categories %}
        <option value="{{ c }}"
        {% if c|string|trim|lower == row[10]|string|trim|lower %}selected{% endif %}>
          {{ c }}
        </option>
        {% endfor %}
      </select>
    </div>

    <!-- PATTERN -->
    <div class="mb-3">
      <label>Pattern</label>
      <select name="pattern" class="form-select">
        <option value="">Select Pattern</option>
        {% for p in patterns %}
        <option value="{{ p }}"
        {% if p|string|trim|lower == row[11]|string|trim|lower %}selected{% endif %}>
          {{ p }}
        </option>
        {% endfor %}
      </select>
    </div>

    <!-- SIZE -->
    <div class="mb-3">
      <label>Size</label>
      <select name="size" class="form-select">
        <option value="">Select Size</option>
        {% for s in sizes %}
        <option value="{{ s }}"
        {% if s|string|trim|lower == row[12]|string|trim|lower %}selected{% endif %}>
          {{ s }}
        </option>
        {% endfor %}
      </select>
    </div>

    <!-- QTY -->
    <div class="mb-3">
      <label>Final Qty</label>
      <input type="number" name="qty" class="form-control" min="1" required placeholder="Enter quantity">
    </div>

    <!-- BUTTONS -->
    <div class="d-flex justify-content-between mt-4">

      <!-- BACK -->
      <a href="/stock_fulfill" class="btn btn-back">⬅ Back</a>

      <!-- RESET >
      <button type="reset" class="btn btn-reset" onclick="return confirm('Are you sure to reset?')">Reset</button-->

      <!-- SUBMIT -->
      <button type="submit" class="btn btn-custom">Submit</button>

      <button type="button" class="btn btn-reset" onclick="window.history.back()">Cancel</button>

    </div>

  </form>
</div>

</body>
</html>
