<!DOCTYPE html>
<html>
<head>
    <title>Form</title>
</head>
<body>

<h2>Member Form</h2>

<form method="POST">

    ID: <input type="text" name="id" value="{{ id }}" readonly><br><br>

    Branch:
    <select name="branch" required>
        <option value="">Select</option>
        <option>Ambikapur</option>
        <option>Bhilai</option>
        <option>Bilaspur</option>
        <option>Durg</option>
        <option>Jabalpur</option>
        <option>Pulgaon1</option>
        <option>Pulgaon2</option>
        <option>Raipur</option>        
        <option>Rajnandgaon</option>
        <option>Rewa</option>
    </select><br><br>

    Name:
    <input type="text" name="name" required><br><br>

    Contact:
    <input type="text" name="contact" pattern="[0-9]{10}" maxlength="10" required>
    <br><br>

    Address:
    <input type="text" name="address"><br><br>

    Total Members:
    <input type="text" name="members" pattern="[0-9]+" required>
    <br><br>

    <button type="submit">Submit</button>

</form>

</body>
</html>
