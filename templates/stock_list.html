<h2>Stock List</h2>

<table border="1">
<tr>
    <th>UID</th>
    <th>Sub ID</th>
    <th>Item</th>
    <th>Qty</th>
    <th>Action</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row.uid }}</td>
    <td>{{ row.sub_id }}</td>
    <td>{{ row.item }}</td>
    <td>{{ row.qty }}</td>
    <td>
        <a href="/stock_fulfill/{{ row.uid }}/{{ row.sub_id }}">
            Fulfill
        </a>
        
    </td>
</tr>
{% endfor %}
</table>
